# Configuration SonarQube pour TaskList Backend
# Ce fichier définit les paramètres d'analyse de qualité du code

# Identifiant unique du projet dans SonarQube
sonar.projectKey=tasklist-backend

# Nom affiché dans l'interface SonarQube
sonar.projectName=TaskList Backend

# Version du projet
sonar.projectVersion=1.0.0

# Répertoire source à analyser
sonar.sources=src

# Exclusion des fichiers de tests de l'analyse des sources
sonar.exclusions=src/__tests__/**,**/*.test.ts,**/*.spec.ts

# Répertoire contenant les tests
sonar.tests=src/__tests__

# Pattern pour identifier les fichiers de tests
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts

# Chemin vers le rapport de couverture de code (LCOV)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encodage des fichiers sources
sonar.sourceEncoding=UTF-8

# Langue principale du projet
sonar.language=ts

# Extensions de fichiers TypeScript
sonar.typescript.file.suffixes=.ts,.tsx
